document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

px\">Request received.<\u002Fh3>\n            <p style=\"color:var(--muted)\">Thank you — we'll reach out within one business day to schedule your free audit.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ notSubmitted }}\" hint-placeholder-val=\"{{ true }}\">\n          <div>\n            <h3 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:22px;margin-bottom:20px\">Book your free audit<\u002Fh3>\n            <div style=\"display:flex;flex-direction:column;gap:14px\">\n              <div>\n                <label style=\"display:block;font-size:13px;color:var(--muted);margin-bottom:7px\">Full name<\u002Flabel>\n                <input value=\"{{ fName }}\" oninput=\"{{ onName }}\" placeholder=\"Jane Doe\" style=\"{{ inputStyle }}\">\n              <\u002Fdiv>\n              <div>\n                <label style=\"display:block;font-size:13px;color:var(--muted);margin-bottom:7px\">Store / brand name<\u002Flabel>\n                <input value=\"{{ fBrand }}\" oninput=\"{{ onBrand }}\" placeholder=\"Your store\" style=\"{{ inputStyle }}\">\n              <\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px\">\n                <div>\n                  <label style=\"display:block;font-size:13px;color:var(--muted);margin-bottom:7px\">Platform<\u002Flabel>\n                  <select value=\"{{ fPlatform }}\" onchange=\"{{ onPlatform }}\" style=\"{{ inputStyle }}\">\n                    <option>Shopify<\u002Foption><option>WooCommerce<\u002Foption><option>TikTok Shop<\u002Foption><option>Daraz<\u002Foption><option>Other / D2C<\u002Foption>\n                  <\u002Fselect>\n                <\u002Fdiv>\n                <div>\n                  <label style=\"display:block;font-size:13px;color:var(--muted);margin-bottom:7px\">Orders / month<\u002Flabel>\n                  <select value=\"{{ fVolume }}\" onchange=\"{{ onVolume }}\" style=\"{{ inputStyle }}\">\n                    <option>100–500<\u002Foption><option>500–2,000<\u002Foption><option>2,000–10,000<\u002Foption><option>10,000+<\u002Foption>\n                  <\u002Fselect>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div>\n                <label style=\"display:block;font-size:13px;color:var(--muted);margin-bottom:7px\">WhatsApp / email<\u002Flabel>\n                <input value=\"{{ fContact }}\" oninput=\"{{ onContact }}\" placeholder=\"+92 3xx xxxxxxx\" style=\"{{ inputStyle }}\">\n              <\u002Fdiv>\n              <sc-if value=\"{{ showError }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"font-size:13.5px;color:#ff8080\">Please add your name and a way to reach you.<\u002Fdiv>\n              <\u002Fsc-if>\n              <button onclick=\"{{ submit }}\" style=\"margin-top:4px;width:100%;padding:15px;background:var(--signal);color:#04120C;font-family:inherit;font-weight:600;font-size:16px;border:none;border-radius:12px;cursor:pointer;box-shadow:0 12px 34px -14px var(--signal)\" onmouseenter=\"{{ ctaIn }}\" onmouseleave=\"{{ ctaOut }}\">Claim My Free Audit<\u002Fbutton>\n              <p style=\"font-size:12.5px;color:var(--muted);text-align:center\">No credit card. No obligation. Response within 1 business day.<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ================= FOOTER ================= -->\n  <footer style=\"border-top:1px solid var(--hair);background:var(--surface)\">\n    <div style=\"max-width:1320px;margin:0 auto;padding:56px clamp(20px,5vw,64px) 40px;display:grid;grid-template-columns:1.5fr 1fr 1fr;gap:40px\" class=\"ss-footgrid\">\n      <div>\n        <div style=\"display:flex;align-items:center;gap:11px;margin-bottom:16px\">\n          <span style=\"display:grid;place-items:center;width:30px;height:30px;border:1px solid var(--hair);border-radius:8px;background:var(--ink)\"><span style=\"width:8px;height:8px;border-radius:50%;background:var(--signal);box-shadow:0 0 12px var(--signal)\"><\u002Fspan><\u002Fspan>\n          <span style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:19px;letter-spacing:-.02em\">Ship<span style=\"color:var(--signal)\">Sight<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"color:var(--muted);font-size:15px;max-width:340px\">Premium ecommerce operations &amp; profitability consulting. We find the money already inside your business — and build the systems to keep it.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:13px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:14px\">Explore<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:10px\">\n          <a href=\"#services\" style=\"color:var(--text);text-decoration:none;font-size:15px;opacity:.8\">Services<\u002Fa>\n          <a href=\"dashboard.html\" style=\"color:var(--text);text-decoration:none;font-size:15px;opacity:.8\">Live Dashboard<\u002Fa>\n          <a href=\"#cases\" style=\"color:var(--text);text-decoration:none;font-size:15px;opacity:.8\">Case Studies<\u002Fa>\n          <a href=\"#founder\" style=\"color:var(--text);text-decoration:none;font-size:15px;opacity:.8\">About Founder<\u002Fa>\n          <a href=\"#faq\" style=\"color:var(--text);text-decoration:none;font-size:15px;opacity:.8\">FAQ<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:13px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:14px\">Get in touch<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:10px\">\n          <a href=\"{{ waLink }}\" target=\"_blank\" style=\"color:var(--signal);text-decoration:none;font-size:15px\">WhatsApp: +92 331 0412072<\u002Fa>\n          <a href=\"#book\" style=\"color:var(--text);text-decoration:none;font-size:15px;opacity:.8\">Book Free Audit<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border-top:1px solid var(--hair)\"><div style=\"max-width:1320px;margin:0 auto;padding:20px clamp(20px,5vw,64px);display:flex;flex-wrap:wrap;justify-content:space-between;gap:12px;font-size:13px;color:var(--muted)\"><span>© 2026 Ship Sight. All rights reserved.<\u002Fspan><span>Built for operators who'd rather keep their profit.<\u002Fspan><\u002Fdiv><\u002Fdiv>\n  <\u002Ffooter>\n\n  <!-- ================= FLOATING WHATSAPP ================= -->\n  <a href=\"{{ waLink }}\" target=\"_blank\" style=\"position:fixed;bottom:24px;right:24px;z-index:60;display:flex;align-items:center;gap:10px;padding:13px 18px 13px 15px;background:var(--signal);color:#04120C;font-weight:600;font-size:15px;text-decoration:none;border-radius:100px;box-shadow:0 14px 40px -10px var(--signal)\" onmouseenter=\"{{ ctaIn }}\" onmouseleave=\"{{ ctaOut }}\">\n    <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"#04120C\"><path d=\"M12 2a10 10 0 0 0-8.6 15.1L2 22l5.1-1.3A10 10 0 1 0 12 2zm0 18a8 8 0 0 1-4.1-1.1l-.3-.2-3 .8.8-2.9-.2-.3A8 8 0 1 1 12 20zm4.4-5.9c-.2-.1-1.4-.7-1.6-.8-.2-.1-.4-.1-.5.1l-.7.9c-.1.2-.3.2-.5.1a6.6 6.6 0 0 1-3.2-2.8c-.2-.4.2-.4.6-1.2.1-.2 0-.3 0-.5l-.8-1.8c-.2-.5-.4-.4-.5-.4h-.5a1 1 0 0 0-.7.3c-.2.3-.9.9-.9 2.1s.9 2.5 1 2.6c.1.2 1.8 2.8 4.4 3.9 1.6.7 2.3.7 3.1.6.5-.1 1.4-.6 1.6-1.1.2-.6.2-1 .1-1.1 0-.1-.2-.2-.4-.3z\"><\u002Fpath><\u002Fsvg>\n    Chat now\n  <\u002Fa>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    faqOpen: 0,\n    scenario: \"before\",\n    submitted: false,\n    showError: false,\n    fName: \"\", fBrand: \"\", fPlatform: \"Shopify\", fVolume: \"100–500\", fContact: \"\"\n  };\n\n  componentDidMount() {\n    // animated counters\n    const root = document.getElementById(\"shipsight-home\");\n    if (!root) return;\n    const nums = root.querySelectorAll(\"[data-count]\");\n    const animate = (el) => {\n      const target = parseFloat(el.getAttribute(\"data-count\"));\n      const dec = parseInt(el.getAttribute(\"data-decimals\") || \"0\", 10);\n      const pad = parseInt(el.getAttribute(\"data-pad\") || \"0\", 10);\n      const dur = 1400, start = performance.now();\n      const step = (now) => {\n        const p = Math.min(1, (now - start) / dur);\n        const e = 1 - Math.pow(1 - p, 3);\n        let v = (target * e).toFixed(dec);\n        if (pad) v = String(Math.round(target * e)).padStart(pad, \"0\");\n        el.textContent = v;\n        if (p < 1) requestAnimationFrame(step);\n        else el.textContent = pad ? String(target).padStart(pad, \"0\") : target.toFixed(dec);\n      };\n      requestAnimationFrame(step);\n    };\n    const io = new IntersectionObserver((entries) => {\n      entries.forEach((ent) => {\n        if (ent.isIntersecting) { animate(ent.target); io.unobserve(ent.target); }\n      });\n    }, { threshold: 0.6 });\n    nums.forEach((n) => io.observe(n));\n\n    // (reveal handled via pure CSS scroll-driven animation in <helmet> — no JS,\n    //  so React re-renders can never leave content hidden)\n\n    // responsive nav links + grids\n    this.applyResponsive();\n    this._onResize = () => this.applyResponsive();\n    window.addEventListener(\"resize\", this._onResize);\n  }\n\n  componentWillUnmount() {\n    if (this._onResize) window.removeEventListener(\"resize\", this._onResize);\n  }\n\n  applyResponsive() {\n    const root = document.getElementById(\"shipsight-home\");\n    if (!root) return;\n    const w = window.innerWidth;\n    const nav = root.querySelector(\".ss-navlinks\");\n    if (nav) nav.style.display = w > 940 ? \"flex\" : \"none\";\n    const two = [\"ss-herogrid\", \"ss-dashgrid\", \"ss-foundergrid\", \"ss-bookgrid\"];\n    two.forEach((c) => { const el = root.querySelector(\".\" + c); if (el) el.style.gridTemplateColumns = w > 900 ? \"\" : \"1fr\"; });\n    const four = [\"ss-leakgrid\", \"ss-metricgrid\"];\n    four.forEach((c) => { const el = root.querySelector(\".\" + c); if (el) el.style.gridTemplateColumns = w > 900 ? \"repeat(4,1fr)\" : (w > 560 ? \"repeat(2,1fr)\" : \"1fr\"); });\n    const serv = root.querySelector(\".ss-servgrid\");\n    if (serv) serv.style.gridTemplateColumns = w > 720 ? \"repeat(2,1fr)\" : \"1fr\";\n    const quote = root.querySelector(\".ss-quotegrid\");\n    if (quote) quote.style.gridTemplateColumns = w > 820 ? \"repeat(3,1fr)\" : (w > 540 ? \"repeat(2,1fr)\" : \"1fr\");\n    const proc = root.querySelector(\".ss-procgrid\");\n    if (proc) proc.style.gridTemplateColumns = w > 820 ? \"repeat(4,1fr)\" : (w > 520 ? \"repeat(2,1fr)\" : \"1fr\");\n    const foot = root.querySelector(\".ss-footgrid\");\n    if (foot) foot.style.gridTemplateColumns = w > 720 ? \"1.5fr 1fr 1fr\" : \"1fr\";\n  }\n\n  hoverIn = (e) => { e.currentTarget.style.color = \"var(--text)\"; e.currentTarget.style.background = \"rgba(255,255,255,.05)\"; };\n  hoverOut = (e) => { e.currentTarget.style.color = \"var(--muted)\"; e.currentTarget.style.background = \"none\"; };\n  ctaIn = (e) => { e.currentTarget.style.background = \"var(--signal2)\"; e.currentTarget.style.transform = \"translateY(-2px)\"; e.currentTarget.style.transition = \"all .2s ease\"; };\n  ctaOut = (e) => { e.currentTarget.style.background = \"var(--signal)\"; e.currentTarget.style.transform = \"none\"; };\n  ghostIn = (e) => { e.currentTarget.style.borderColor = \"var(--signal)\"; e.currentTarget.style.background = \"var(--surface2)\"; e.currentTarget.style.transition = \"all .2s ease\"; };\n  ghostOut = (e) => { e.currentTarget.style.borderColor = \"var(--hair)\"; e.currentTarget.style.background = \"var(--surface)\"; };\n  cardIn = (e) => { e.currentTarget.style.borderColor = \"rgba(23,227,154,.35)\"; e.currentTarget.style.transform = \"translateY(-4px)\"; e.currentTarget.style.transition = \"all .25s ease\"; };\n  cardOut = (e) => { e.currentTarget.style.borderColor = \"var(--hair)\"; e.currentTarget.style.transform = \"none\"; };\n\n  setBefore = () => this.setState({ scenario: \"before\" });\n  setAfter = () => this.setState({ scenario: \"after\" });\n\n  toggleFaq = (i) => this.setState((s) => ({ faqOpen: s.faqOpen === i ? -1 : i }));\n\n  onName = (e) => this.setState({ fName: e.target.value });\n  onBrand = (e) => this.setState({ fBrand: e.target.value });\n  onPlatform = (e) => this.setState({ fPlatform: e.target.value });\n  onVolume = (e) => this.setState({ fVolume: e.target.value });\n  onContact = (e) => this.setState({ fContact: e.target.value });\n  submit = () => {\n    if (!this.state.fName.trim() || !this.state.fContact.trim()) { this.setState({ showError: true }); return; }\n    this.setState({ submitted: true, showError: false });\n  };\n\n  renderVals() {\n    const after = this.state.scenario === \"after\";\n    const btnBase = \"padding:9px 16px;border:none;border-radius:8px;font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s ease;\";\n    const activeBtn = btnBase + \"background:var(--signal);color:#04120C;\";\n    const idleBtn = btnBase + \"background:transparent;color:var(--muted);\";\n\n    const faqData = [\n      { q: \"What exactly is the Free Business Audit?\", a: \"A no-cost review of your ecommerce operation where we identify your biggest profit leaks — failed deliveries, returns, courier inefficiency, and hidden costs — and estimate what recovering them is worth. You keep the findings whether or not we work together.\" },\n      { q: \"How is Ship Sight different from a marketing agency?\", a: \"Marketing agencies work to increase your sales. We work to maximize the profit from the sales you already have — by fixing operations, logistics, and revenue leakage. We're an implementation partner, not just an advisor.\" },\n      { q: \"Which platforms and business sizes do you work with?\", a: \"Shopify, WooCommerce, TikTok Shop, Daraz, and D2C brands — typically businesses processing 100+ orders per month that are ready to scale profitably.\" },\n      { q: \"Do you just give recommendations, or do you implement?\", a: \"We implement. We partner with your team to deploy fixes, build scalable systems and SOPs, and stand up live dashboards so improvements are measurable and durable.\" },\n      { q: \"How soon will I see results?\", a: \"Many operational leaks — like courier and delivery-success issues — can be addressed within the first engagement cycle. The audit prioritizes the fastest, highest-value wins first.\" }\n    ];\n    const faqs = faqData.map((f, i) => ({\n      q: f.q, a: f.a,\n      open: this.state.faqOpen === i,\n      sign: this.state.faqOpen === i ? \"−\" : \"+\",\n      toggle: () => this.toggleFaq(i)\n    }));\n\n    const testimonials = [\n      { quote: \"Ship Sight found margin we didn't know we were losing. Our delivery success jumped and returns dropped within weeks.\", name: \"Ayesha K.\", role: \"Founder, Apparel D2C\", initial: \"A\" },\n      { quote: \"Finally a consultant who actually implements. The dashboards alone changed how we run the business.\", name: \"Bilal R.\", role: \"Ops Lead, Shopify Store\", initial: \"B\" },\n      { quote: \"They treated our profit like it was their own. ROI-focused, no fluff, real operational change.\", name: \"Sana M.\", role: \"Owner, TikTok Shop Brand\", initial: \"S\" }\n    ];\n\n    return {\n      waLink: \"https://wa.me/923310412072?text=Hi%20Ship%20Sight%2C%20I%27d%20like%20a%20free%20business%20audit.\",\n      // dashboard scenario\n      delivery: after ? \"93\" : \"71\",\n      returns: after ? \"6\" : \"14\",\n      margin: after ? \"18.4\" : \"7.9\",\n      metricColor: after ? \"var(--signal)\" : \"var(--text)\",\n      returnColor: after ? \"var(--signal)\" : \"#ff8080\",\n      profitLabel: after ? \"▲ recovered\" : \"leaking\",\n      barColor: after ? \"rgba(23,227,154,.35)\" : \"var(--surface2)\",\n      barColorHi: after ? \"linear-gradient(180deg,var(--signal),var(--signal2))\" : \"var(--surface2)\",\n      barGlow: after ? \"0 0 22px -4px var(--signal)\" : \"none\",\n      b1: after ? \"44%\" : \"40%\", b2: after ? \"56%\" : \"46%\", b3: after ? \"52%\" : \"42%\",\n      b4: after ? \"72%\" : \"50%\", b5: after ? \"84%\" : \"48%\", b6: after ? \"100%\" : \"52%\",\n      beforeBtnStyle: after ? idleBtn : activeBtn,\n      afterBtnStyle: after ? activeBtn : idleBtn,\n      setBefore: this.setBefore, setAfter: this.setAfter,\n      faqs, testimonials,\n      // form\n      submitted: this.state.submitted,\n      notSubmitted: !this.state.submitted,\n      showError: this.state.showError,\n      fName: this.state.fName, fBrand: this.state.fBrand,\n      fPlatform: this.state.fPlatform, fVolume: this.state.fVolume, fContact: this.state.fContact,\n      onName: this.onName, onBrand: this.onBrand, onPlatform: this.onPlatform, onVolume: this.onVolume, onContact: this.onContact,\n      submit: this.submit,\n      inputStyle: \"width:100%;padding:12px 14px;background:var(--ink);border:1px solid var(--hair);border-radius:10px;color:var(--text);font-family:inherit;font-size:15px;outline:none;\",\n      hoverIn: this.hoverIn, hoverOut: this.hoverOut, ctaIn: this.ctaIn, ctaOut: this.ctaOut,\n      ghostIn: this.ghostIn, ghostOut: this.ghostOut, cardIn: this.cardIn, cardOut: this.cardOut\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
